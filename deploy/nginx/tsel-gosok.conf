# ─────────────────────────────────────────────────────────────────────────────
# nginx site config — telkomsel1.qlipmobile.com (Gosok Kartu)
#
#   Cloudflare (edge SSL)  ──►  Origin 148.230.100.213 :443 (this nginx, Origin SSL)
#                                    └─►  Static SPA (dist/) + server.mjs fallback
#                                         on  http://127.0.0.1:5280
#
# App stack: Vite-built static SPA emitted to dist/; nginx serves the hashed
# assets directly from disk, missing paths fall back to server.mjs (zero-dep
# Node static server) under PM2 on 127.0.0.1:5280 which returns index.html.
#
# SSL: terminate at the origin with a Cloudflare Origin Certificate so you can
#      run Cloudflare SSL mode "Full (strict)". Generate it in the Cloudflare
#      dashboard (SSL/TLS → Origin Server → Create Certificate) and paste the
#      cert + key into the two files referenced below.
#
# Install:
#   sudo mkdir -p /etc/nginx/ssl/telkomsel1.qlipmobile.com
#   # paste cert  → /etc/nginx/ssl/telkomsel1.qlipmobile.com/origin.pem
#   # paste key   → /etc/nginx/ssl/telkomsel1.qlipmobile.com/origin.key
#   sudo cp deploy/nginx/tsel-gosok.conf \
#       /etc/nginx/sites-available/telkomsel1.qlipmobile.com
#   sudo ln -s /etc/nginx/sites-available/telkomsel1.qlipmobile.com \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Upstream = the static-file Node process managed by PM2 (ecosystem.config.cjs).
upstream tsel_gosok {
    server 127.0.0.1:5280;
    keepalive 32;
}

# ── HTTP :80 ── redirect everything to HTTPS ────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name telkomsel1.qlipmobile.com;

    # Allow ACME http-01 if you ever switch off Cloudflare Origin certs.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 ──────────────────────────────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name telkomsel1.qlipmobile.com;

    # Cloudflare Origin Certificate — paste your cert + key into these files.
    ssl_certificate     /etc/nginx/ssl/telkomsel1.qlipmobile.com/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/telkomsel1.qlipmobile.com/origin.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Authenticated Origin Pulls (optional, recommended): verify the request really
    # came from Cloudflare. Download the CF origin-pull CA and uncomment:
    # ssl_client_certificate /etc/nginx/ssl/cloudflare/authenticated_origin_pull_ca.pem;
    # ssl_verify_client on;

    # ── Logs ──
    access_log /var/log/nginx/telkomsel1.qlipmobile.com.access.log;
    error_log  /var/log/nginx/telkomsel1.qlipmobile.com.error.log;

    # ── Body / timeouts ──
    client_max_body_size 2m;
    proxy_read_timeout   60s;
    proxy_send_timeout   60s;

    # ── Compression (text only; static assets below get long-lived caching) ──
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/manifest+json;

    # Vite client assets emitted to dist/. Filenames are content-hashed and
    # immutable, so serve them straight from disk with a long cache instead of
    # round-tripping through the Node process.
    root /home/qlip/tsel-gosok/dist;

    location /assets/ {
        try_files  $uri @backend;
        access_log off;
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # Small root-level static files emitted by the build.
    location = /favicon.ico {
        try_files  $uri @backend;
        access_log off;
        expires    7d;
    }
    location = /robots.txt {
        try_files  $uri @backend;
        access_log off;
    }

    # ── Everything else → static index.html via server.mjs SPA fallback ──
    location / {
        try_files $uri @backend;
    }

    location @backend {
        proxy_pass http://tsel_gosok;
        proxy_http_version 1.1;

        # Preserve the original host + scheme so absolute URLs build correctly.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Keepalive to upstream.
        proxy_set_header Connection "";
    }
}
