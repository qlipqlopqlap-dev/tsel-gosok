# nginx reverse proxy for Gosok Kartu (PM2: tsel-gosok @ :5280).
# Install: copy to /etc/nginx/sites-available/tsel-gosok.conf,
#          ln -s ../sites-available/tsel-gosok.conf /etc/nginx/sites-enabled/,
#          nginx -t && systemctl reload nginx
#
# Serves one app on :5280. server.mjs serves index.html for any non-file path,
# so nginx needs no try_files.

upstream tsel_gosok {
    server 127.0.0.1:5280;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    server_name telkomsel1.qlipmobile.com;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Content-hashed assets → cache hard at the edge/browser.
    location /assets/ {
        proxy_pass http://tsel_gosok;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # App. server.mjs handles SPA fallback.
    location / {
        proxy_pass http://tsel_gosok;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────
# Option A — certbot:  sudo certbot --nginx -d telkomsel1.qlipmobile.com
# Option B — Cloudflare proxied, SSL/TLS mode "Full".
